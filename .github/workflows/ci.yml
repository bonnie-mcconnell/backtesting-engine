name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.1.3"

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/

      - name: Type check (mypy)
        run: poetry run mypy src/

      - name: Run tests
        run: poetry run pytest -v --tb=short

      - name: Verify public API importable
        run: |
          poetry run python -c "
          from backtesting_engine import (
              walk_forward, MovingAverageStrategy, KalmanFilterStrategy,
              ExecutionConfig, build_dashboard, load_data, validate_data,
              BacktestResult, MetricsResult, cost_sensitivity_sweep,
          )
          print('Public API: all imports OK')
          "