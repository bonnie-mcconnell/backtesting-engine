name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.1.3"

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/

      - name: Type check (mypy)
        run: poetry run mypy src/

      - name: Run tests
        # Network-requiring tests are excluded by the `addopts = "-m 'not network'"`
        # setting in pyproject.toml. Run `pytest -m network` locally or in a
        # scheduled job with live credentials to exercise the data layer against
        # real yfinance responses.
        run: poetry run pytest -v --tb=short

      - name: Verify public API importable
        run: |
          poetry run python -c "
          from backtesting_engine import (
              walk_forward, MovingAverageStrategy, KalmanFilterStrategy,
              ExecutionConfig, build_dashboard, load_data, validate_data,
              BacktestResult, MetricsResult, cost_sensitivity_sweep,
              compute_benchmark, BenchmarkResult,
              MomentumStrategy,
          )
          print('Public API: all imports OK')
          "

      - name: Verify pyarrow available for Parquet cache
        run: poetry run python -c "import pyarrow; print('pyarrow', pyarrow.__version__)"

      - name: Verify CLI help
        run: poetry run backtesting-engine --help

      - name: Verify version consistency (pyproject.toml vs CHANGELOG)
        run: |
          PYPROJECT_VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          CHANGELOG_VERSION=$(grep -m1 '## \[' CHANGELOG.md | sed 's/.*\[\(.*\)\].*/\1/')
          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "CHANGELOG:      $CHANGELOG_VERSION"
          if [ "$PYPROJECT_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "ERROR: version mismatch - bump pyproject.toml or add CHANGELOG entry"
            exit 1
          fi
